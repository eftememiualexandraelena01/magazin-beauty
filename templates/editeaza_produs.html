<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">

    <title>Editare produs</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Card editare -->
    <div class="card shadow-sm p-4">

        <!-- Titlu -->
        <h1 class="mb-4 text-center">
            Editare produs
        </h1>

        <!-- Formular editare -->
        <form
            method="POST"
            action="/editeaza/{{ produs.id_produs }}">

            <!-- NUME -->
            <div class="mb-3">

                <label class="form-label">
                    Nume produs
                </label>

                <input
                    type="text"
                    name="nume"
                    value="{{ produs.nume }}"
                    class="form-control"
                    required>

            </div>

            <!-- BRAND -->
            <div class="mb-3">

                <label class="form-label">
                    Brand
                </label>

                <input
                    type="text"
                    name="brand"
                    value="{{ produs.brand }}"
                    class="form-control"
                    required>

            </div>

            <!-- CATEGORIE -->
            <div class="mb-3">

                <label class="form-label">
                    Categorie
                </label>

                <input
                    type="text"
                    name="categorie"
                    value="{{ produs.categorie }}"
                    class="form-control"
                    required>

            </div>

            <!-- PREȚ -->
            <div class="mb-3">

                <label class="form-label">
                    Preț
                </label>

                <div class="input-group">

                    <input
                        type="number"
                        step="0.01"
                        min="0"
                        name="pret"
                        value="{{ produs.pret }}"
                        class="form-control"
                        required>

                    <span class="input-group-text">
                        lei
                    </span>

                </div>

            </div>

            <!-- STOC -->
            <div class="mb-4">

                <label class="form-label">
                    Stoc
                </label>

                <input
                    type="number"
                    min="0"
                    name="stoc"
                    value="{{ produs.stoc }}"
                    class="form-control"
                    required>

            </div>

            <!-- Butoane -->
            <div class="d-flex gap-2">

                <button
                    type="submit"
                    class="btn btn-success">

                    Salvează modificările

                </button>

                <a
                    href="/"
                    class="btn btn-secondary">

                    Înapoi

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
