<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">

    <title>Adaugă produs</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Card formular -->
    <div class="card shadow-sm p-4">

        <!-- Titlu -->
        <h1 class="mb-4 text-center">
            Adaugă produs
        </h1>

        <!-- Formular -->
        <form method="POST">

            <!-- NUME -->
            <div class="mb-3">

                <label class="form-label">
                    Nume produs
                </label>

                <input
                    type="text"
                    name="nume"
                    class="form-control"
                    placeholder="Introdu numele produsului"
                    required>

            </div>

            <!-- BRAND -->
            <div class="mb-3">

                <label class="form-label">
                    Brand
                </label>

                <input
                    type="text"
                    name="brand"
                    class="form-control"
                    placeholder="Introdu brandul"
                    required>

            </div>

            <!-- CATEGORIE -->
            <div class="mb-3">

                <label class="form-label">
                    Categorie
                </label>

                <input
                    type="text"
                    name="categorie"
                    class="form-control"
                    placeholder="Ex: Makeup, Skincare, Haircare"
                    required>

            </div>

            <!-- PREȚ -->
            <div class="mb-3">

                <label class="form-label">
                    Preț
                </label>

                <div class="input-group">

                    <input
                        type="number"
                        step="0.01"
                        min="0"
                        name="pret"
                        class="form-control"
                        placeholder="0.00"
                        required>

                    <span class="input-group-text">
                        lei
                    </span>

                </div>

            </div>

            <!-- STOC -->
            <div class="mb-4">

                <label class="form-label">
                    Stoc
                </label>

                <input
                    type="number"
                    min="0"
                    name="stoc"
                    class="form-control"
                    placeholder="Cantitate produs"
                    required>

            </div>

            <!-- Butoane -->
            <div class="d-flex gap-2">

                <button
                    type="submit"
                    class="btn btn-primary">

                    Adaugă produs

                </button>

                <a
                    href="/"
                    class="btn btn-secondary">

                    Înapoi

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
